<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
            },
            colors: {
              // We will just rely on default Tailwind colors for our exact hex codes.
              // Background: slate-50 (#F8FAFC), Dark bg: slate-900 (#0F172A)
              // Primary: indigo-500 (#6366F1), Accent: emerald-500 (#10B981)
              // Profit: green-500 (#22C55E), Loss: red-500 (#EF4444), Warning: amber-500 (#F59E0B)
            },
            animation: { ripple: 'ripple 0.6s linear' },
            keyframes: { ripple: { '0%': { transform: 'scale(0)', opacity: 1 }, '100%': { transform: 'scale(40)', opacity: 0 } } }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FAF7F2;
        color: #0F172A; /* slate-900 */
        transition: background-color 0.3s, color 0.3s;
      }
      .dark body {
        background-color: #0F172A;
        color: #E2E8F0; /* slate-200 */
      }
      .privacy-blur {
        filter: blur(6px);
        user-select: none;
        pointer-events: none;
        transition: all 0.3s;
      }
      .glass-card {
        background-color: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
        border-radius: 16px;
      }
      .dark .glass-card {
        background-color: rgba(30, 41, 59, 0.75); /* #1E293B */
        border-color: rgba(51, 65, 85, 0.4); /* slate-700 */
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
      }
      .modal-overlay {
        position: fixed; top: 0; right: 0; bottom: 0; left: 0;
        background-color: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(8px);
        z-index: 50; display: flex; align-items: center; justify-content: center;
      }
      .modal-card {
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      }
      .dark .modal-card {
        background-color: #1E293B;
      }
      
      /* FinX Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background-color: #6366F1;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
